# Avatar ring and transparent avatar asset.
shape {
    monitor =
    size = 58, 58
    color = rgba(0f111500)
    rounding = 29
    border_size = 2
    border_color = $accent
    position = -251, 360
    halign = center
    valign = center
}

image {
    monitor =
    path = $theme/assets/avatar.png
    size = 27
    position = -251, 360
    halign = center
    valign = center
}

label {
    monitor =
    text = <b>Welcome back, ae!</b>
    color = $text
    font_size = 28
    font_family = $font
    position = 5, 380
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date '+%A, %B %-d'
    color = rgba(9b3b35cc) #$muted
    font_size = 22
    font_family = $font
    position = 5, 335
    halign = center
    valign = center
}


label {
    monitor =
    text = cmd[update:60000] date '+%H'
    color = rgba(9b3b35cc) #$text
    font_size = 22
    font_family = $font
    position = 250, 375
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date '+%M'
    color = $text
    font_size = 22
    font_family = $font
    position = 250, 345
    halign = center
    valign = center
}

####################################
# LOGO
####################################
image {
    monitor =
    path = $theme/assets/silson.png
    size = 360
    rounding = 0
    border_size = 0
    position = 0, 45
    halign = center
    valign = center
}

