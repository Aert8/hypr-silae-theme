#LockScreen

$theme = /home/ae/.config/hypr/conflock
$font = Inter
$icons = JetBrainsMono Nerd Font
$card = rgba(19191eb8)
$card-border = rgba(ffffff1a)
$text = rgb(b2b2b2)
$muted = rgb(b8bec8)
$accent = rgba(9b3b35cc)#rgb(8da6b5)
$success = rgb(b9d6b3)
$error = rgb(d88a8a)

general {
    hide_cursor = true
    immediate_render = true
}

animations {
    enabled = true
    bezier = soft, 0.22, 1, 0.36, 1
    animation = fadeIn, 1, 5, soft
    animation = fadeOut, 1, 4, soft
    animation = inputFieldDots, 1, 3, soft
}

####################################
# BACKGROUND
####################################
background {
    monitor =
    path = screenshot
    color = rgba(0f1115cc)
    blur_passes = 3
    blur_size = 7
    noise = 0.012
    contrast = 0.90
    brightness = 0.58
    vibrancy = 0.08
    vibrancy_darkness = 0.15
}

