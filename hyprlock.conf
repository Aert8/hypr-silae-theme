####################################
# BATTERY
####################################
image {
    monitor =
    path = $theme/assets/battery-icon.png
    size = 22
    position = 345, -255
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] $theme/scripts/battery.sh
    color = $text
    font_size = 18
    font_family = $font
    position = 400, -255
    halign = center
    valign = center
}

####################################
# KEYBOARD
####################################
image {
    monitor =
    path = $theme/assets/keyboard-icon.png
    size = 41
    rounding = 0
    border_size = 0
    position = -400, -255
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:500] $theme/scripts/keyboard.sh
    color = $muted
    font_size = 17
    font_family = $font
    position = -338, -255
    halign = center
    valign = center
}

# Empty output makes this label disappear while Caps Lock is disabled.
label {
    monitor =
    text = cmd[update:250] $theme/scripts/capslock.sh
    color = $muted
    font_size = 17
    font_family = $font
    position = 0, -255
    halign = center
    valign = center
}

####################################
# PASSWORD FIELD
####################################
input-field {
    monitor =
    size = 890, 52
    outline_thickness = 3
    inner_color = rgba(0f1115cc)
    outer_color = rgba(9b3b35cc) #rgba(8da6b5c9)
    check_color = rgba(b9d6b3e6)
    fail_color = rgba(d88a8ae6)
    font_color = $text
    font_family = $font
    fade_on_empty = false
    rounding = 18
    placeholder_text =
    fail_text = <b>Se equivocó iiiii</b>#$PAMFAIL
    check_text =
    dots_center = true
    dots_size = 0.26
    dots_spacing = 0.32
    dots_rounding = 1
    position = 0, -330
    halign = center
    valign = center
}
