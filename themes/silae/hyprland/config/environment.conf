#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
#env = QT_QPA_PLATAFORMTHEME,qt6ct #(It's for Qt6 KDE apps, although i have to put it in  ~/.profile)

env = ELECTRON_OZONE_PLATFORM_HINT,auto #FORCES ELECTRON APPS TO USE WAYLAND

env = TERMINAL,kitty
env = TERM,kitty
env = XDG_DATA_DIRS,$HOME/.local/share/flatpak/exports/share:/var/lib/flatpak/exports/share:/usr/local/share:/usr/share #Just in case if you have flatpak apps installed, to make sure flatpak apps can find their data files
